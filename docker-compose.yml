services:
  server:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
    environment:
      - NODE_ENV=production
    env_file: .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "bun", "-e", "const r=await fetch('http://localhost:3000/health'); if(!r.ok) process.exit(1)"]
      interval: 30s
      timeout: 10s
      retries: 3

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
    depends_on:
      - server
    restart: unless-stopped

volumes:
  caddy_data:
